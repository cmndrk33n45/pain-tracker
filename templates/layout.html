<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">

    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link href="/static/css/styles.css" rel="stylesheet">

    <title>{% block title %}{% endblock %}</title>
</head>

<body>
    <header class="border-bottom bg-light d-flex align-items-center">
        <button class="btn border-0 me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#appMenu">
            <i class="bi bi-list icon-hamburger"></i>
        </button>
        <h5 class="mb-0">Pain Tracker</h5>
    </header>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="appMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Pain Tracker</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <a class="d-block mb-3" href="/profile">Profile</a>
            <a class="d-block mb-3" href="/settings">Settings</a>
            <a class="d-block mb-3" href="/report">Export Report</a>
            <a class="d-block mb-3" href="/privacy">Privacy</a>
            <a class="d-block mb-3" href="/logout">Logout</a>
        </div>
    </div>
    <main>
        <div class="container-fluid px-3 py-3">
            {% block main %}{% endblock %}
        </div>
    </main>
    
</body>

</html>
